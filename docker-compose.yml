version: "3.8"

services:
  utrnet-pdf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utrnet-pdf
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # Persists both downloaded models across rebuilds/restarts
      - utrnet_models:/app/models
    environment:
      - PORT=5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s   # first boot downloads ~350 MB total

volumes:
  utrnet_models:
